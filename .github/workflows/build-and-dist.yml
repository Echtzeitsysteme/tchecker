name: Build and Distribute TChecker Library

on:
  push:
    branches:
      - 'master'

jobs:

  build-and-copy-library:
    name: build TChecker
    runs-on: ubuntu-latest
    container: alzeha/echtzeitsysteme-tchecker-gcc:latest
    env:
      INSTALL_DIR: "install"
      CXX: "g++"
      CONFNAME: "int64"
      TCHECKER_BUILD_TYPE: "Release"
      TCHECKER_BOOST_STATIC_LINK: "ON"
      LIBTCHECKER_ENABLE_SHARED: "ON"
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: install static libs
        run: ci-scripts/install_boost_1_86.sh
      - name: build
        run: ci-scripts/build.sh
      - name: copy
        uses: dmnemec/copy_file_to_another_repo_action@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.API_TOKEN_GITHUB }}
        with:
          source_file: 'build/src/libtchecker.so'
          destination_repo: 'Echtzeitsysteme/tcheckerpy'
          destination_folder: 'src/tcheckerpy'
          user_email: 'alexander.lieb@online.de'
          user_name: 'alzeha'
          commit_message: 'updated libtchecker.so from https://github.com/Echtzeitsysteme/tchecker'
      - name: Create artifact
        uses: actions/upload-artifact@v4
        with:
          name: libtchecker.so
          path: build/src/libtchecker.so

# Main idea contributed by [Maximilian Kratz] (@maxkratz)
# Thanks for the inspiration!
  provision:
    runs-on: ubuntu-latest
    needs: build-and-copy-library
    steps:
    - uses: actions/checkout@v6
    # Enable KVM and install QEMU + libvirt + virt-manager
    # Based on:
    # https://github.com/orgs/community/discussions/8305#discussioncomment-5888654
    - name: Enable KVM group perms
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm
        sudo apt-get update
        sudo apt-get install -y - qemu-kvm libvirt-daemon-system libvirt-clients bridge-utils virt-manager
        sudo usermod -a -G kvm,libvirt $USER
    - name: Create Tutorial
      run: |
        sudo apt-get install -y texlive-latex-base texlive-fonts-recommended texlive-fonts-extra texlive-latex-extra latexmk
        latexmk -pdflatex=pdflatex -pdf ci-scripts/vm-tutorial.tex
    - name: Run script
      # Workaround to get a TTY device
      # https://github.com/gfx/example-github-actions-with-tty
      shell: 'script -q -e -c "bash {0}"'
      run: |
        sudo bash ci-scripts/create-vm.sh
    - name: Upload VM
      uses: actions/upload-artifact@v6
      with:
        name: tchecker-ova
        path: tchecker.ova
    - name: Upload Tutorial 
      uses: actions/upload-artifact@v6
      with:
        name: vm-tutorial-pdf
        path: vm-tutorial.pdf
